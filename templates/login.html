<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Tudástár — Bejelentkezés</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b8fa8;
  --accent: #6c8eff;
  --accent2: #a78bfa;
  --error: #f87171;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  line-height: 1.6;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2.5rem;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
}
.card h1 {
  font-size: 1.3rem;
  margin-bottom: .5rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.card p {
  color: var(--text-dim);
  font-size: .85rem;
  margin-bottom: 1.5rem;
}
.card label {
  display: block;
  font-size: .8rem;
  color: var(--text-dim);
  margin-bottom: .3rem;
}
.card input {
  width: 100%;
  padding: .6rem .75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  font-size: .9rem;
  outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
.card input:focus {
  border-color: var(--accent);
}
.card button {
  width: 100%;
  margin-top: 1rem;
  padding: .6rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: .9rem;
  font-weight: 600;
  font-family: inherit;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  transition: all .15s;
}
.card button:hover { opacity: .9; transform: translateY(-1px); }
.card button:disabled { opacity: .5; cursor: wait; transform: none; }
.error {
  background: rgba(248, 113, 113, .12);
  border: 1px solid rgba(248, 113, 113, .3);
  color: var(--error);
  padding: .5rem .75rem;
  border-radius: 6px;
  font-size: .8rem;
  margin-bottom: 1rem;
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 1rem;
  color: var(--text-dim);
  font-size: .8rem;
  text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Bejelentkezés</h1>
  <p>Add meg a hozzáférési tokent a Gemini Tudástár eléréséhez.</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login{% if next_url %}?next={{ next_url|urlencode }}{% endif %}">
    <label for="token">Hozzáférési token</label>
    <input type="password" id="token" name="token" placeholder="Add meg a tokent..." autofocus required>
    <button type="submit">Bejelentkezés</button>
  </form>

  <a href="/" class="back-link">← Vissza az export felületre</a>
</div>
</body>
</html>
