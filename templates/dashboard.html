<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Tudástár</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3345;--text:#e1e4ed;--text-dim:#8b8fa8;--accent:#6c8eff;--accent2:#a78bfa;--success:#34d399;--error:#f87171;--warning:#fbbf24;--radius:8px;--nav-w:280px;--meta-w:300px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;line-height:1.6}

/* ── Top bar ── */
.topbar{height:48px;min-height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:1rem;z-index:20}
.topbar .logo{font-weight:700;font-size:.95rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .nav-links{margin-left:auto;display:flex;gap:.5rem}
.topbar a{color:var(--text-dim);text-decoration:none;font-size:.8rem;padding:.25rem .6rem;border-radius:4px;transition:all .15s}
.topbar a:hover,.topbar a.active{color:var(--text);background:var(--surface2)}

/* ── Sidebar ── */
.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-search{padding:.75rem;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:.8rem;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.filter-chips{display:flex;flex-wrap:wrap;gap:.3rem;padding:.5rem .75rem;border-bottom:1px solid var(--border)}
.chip{font-size:.7rem;padding:.15rem .5rem;border-radius:12px;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);white-space:nowrap;transition:all .15s;background:var(--bg)}
.chip:hover,.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:.5rem 0}
.chat-item{padding:.55rem .75rem;cursor:pointer;border-left:3px solid transparent;transition:all .15s;font-size:.8rem;display:flex;justify-content:space-between;align-items:flex-start}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:var(--surface2);border-left-color:var(--accent)}
.chat-item .ci-title{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.chat-item .ci-meta{color:var(--text-dim);font-size:.7rem;margin-top:2px}
.chat-item .ci-badges{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.ci-badge{font-size:.6rem;padding:1px 5px;border-radius:3px}
.ci-badge.fav{background:rgba(251,191,36,.15);color:var(--warning)}
.ci-badge.img{background:rgba(108,142,255,.15);color:var(--accent)}
.chat-list::-webkit-scrollbar{width:5px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Main content ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.reader{flex:1;overflow-y:auto;padding:2rem;max-width:800px;margin:0 auto;width:100%}
.reader h1{font-size:1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.reader .meta{color:var(--text-dim);font-size:.8rem;padding-bottom:1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.turn{margin-bottom:1.5rem;padding:1rem;border-radius:var(--radius)}
.turn-user{background:#1a2740;border-left:3px solid var(--accent)}
.turn-model{background:var(--surface2);border-left:3px solid var(--success)}
.turn-role{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.turn-role.user{color:var(--accent)}
.turn-role.model{color:var(--success)}
.turn-text{white-space:pre-wrap;word-break:break-word;font-size:.9rem;line-height:1.7}
.turn-images{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem}
.turn-images img{max-width:100%;max-height:300px;border-radius:6px;border:1px solid var(--border)}
.empty-state{text-align:center;color:var(--text-dim);margin-top:4rem}
.empty-state .icon{font-size:3rem;margin-bottom:1rem}

/* ── Right panel ── */
.rpanel{width:var(--meta-w);min-width:var(--meta-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:1rem}
.rpanel h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:.75rem}
.rpanel-section{margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.rpanel label{font-size:.75rem;color:var(--text-dim);display:block;margin-bottom:.3rem}
.rpanel input,.rpanel textarea{width:100%;padding:.4rem .6rem;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:.8rem;outline:none;font-family:inherit;resize:vertical}
.rpanel input:focus,.rpanel textarea:focus{border-color:var(--accent)}
.rpanel textarea{min-height:60px;font-size:.75rem}
.rpanel .btn{display:inline-block;padding:.35rem .8rem;border:none;border-radius:4px;cursor:pointer;font-size:.75rem;font-weight:600;transition:all .15s;font-family:inherit}
.rpanel .btn-accent{background:var(--accent);color:#fff}
.rpanel .btn-accent:hover{opacity:.9}
.rpanel .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);margin-right:.3rem}
.rpanel .btn-outline:hover{border-color:var(--accent)}
.tag-list{display:flex;flex-wrap:wrap;gap:.3rem;margin:.5rem 0}
.tag-item{font-size:.7rem;padding:.15rem .5rem;border-radius:12px;background:rgba(108,142,255,.15);color:var(--accent);display:flex;align-items:center;gap:.3rem}
.tag-item .tag-del{cursor:pointer;opacity:.5;font-weight:700}
.tag-item .tag-del:hover{opacity:1}
.stat-mini{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.stat-mini-item{text-align:center;padding:.5rem;background:var(--bg);border-radius:4px}
.stat-mini-val{font-size:1rem;font-weight:700}
.stat-mini-lbl{font-size:.6rem;color:var(--text-dim);text-transform:uppercase}
/* ── AI ── */
.summary-box{background:linear-gradient(135deg,rgba(108,142,255,.08),rgba(167,139,250,.08));border:1px solid rgba(108,142,255,.2);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem;line-height:1.6;color:var(--text)}
.summary-box .s-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:.3rem;font-weight:600}
.summary-box .s-text{color:var(--text-dim)}
.todo-item{display:flex;align-items:flex-start;gap:.4rem;padding:.35rem 0;border-bottom:1px solid rgba(46,51,69,.5);font-size:.75rem}
.todo-item:last-child{border-bottom:none}
.todo-item input[type=checkbox]{margin-top:3px;accent-color:var(--accent)}
.todo-item .todo-cat{font-size:.55rem;padding:1px 5px;border-radius:3px;background:rgba(108,142,255,.12);color:var(--text-dim);white-space:nowrap}
.todo-item.done .todo-text{text-decoration:line-through;opacity:.5}
.btn-ai{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.4rem .8rem;border-radius:4px;cursor:pointer;font-size:.75rem;font-weight:600;font-family:inherit;transition:all .15s;width:100%}
.btn-ai:hover{opacity:.9;transform:translateY(-1px)}
.btn-ai:disabled{opacity:.5;cursor:wait;transform:none}
.ai-status{font-size:.7rem;color:var(--text-dim);margin-top:.4rem;text-align:center}

@media(max-width:900px){
.rpanel{display:none}
.sidebar{width:200px;min-width:200px}
}
@media(max-width:600px){
.sidebar{display:none}
.main{width:100%}
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
<span class="logo">Gemini Tudástár</span>
<div class="nav-links">
<a href="/">Export</a>
<a href="/dashboard" class="active">Tudástár</a>
</div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="sidebar-search">
<input type="text" id="searchInput" placeholder="Keresés (FTS5)..." oninput="handleSearch(this.value)">
</div>
<div class="filter-chips" id="filterChips"></div>
<div class="chat-list" id="chatList"></div>
</div>

<!-- Main -->
<div class="main" id="main">
<div class="reader" id="reader">
<div class="empty-state">
<div class="icon">📚</div>
<h2>Válassz egy beszélgetést</h2>
<p>Kattints a bal oldali listában egy chat-re a megtekintéséhez.</p>
</div>
</div>
<div class="ai-summary" id="aiSummary" style="display:none"></div>
</div>

<!-- Right panel -->
<div class="rpanel" id="rpanel">
<div class="rpanel-section">
<h3>📊 Statisztika</h3>
<div class="stat-mini" id="statsGrid"></div>
<button class="btn btn-outline" style="margin-top:.5rem;width:100%" onclick="reindex()">🔄 Újraindexelés</button>
</div>
<div class="rpanel-section" id="metaSection" style="display:none">
<h3>🏷️ Metaadatok</h3>
<div>
<label>Címkék</label>
<div class="tag-list" id="tagList"></div>
<input type="text" id="tagInput" placeholder="Új címke... (Enter = hozzáadás)" onkeydown="if(event.key==='Enter')addTag()">
</div>
<div style="margin-top:.75rem">
<label>Projekt</label>
<input type="text" id="projectInput" placeholder="Projekt neve..." onchange="setProject()">
</div>
<div style="margin-top:.75rem">
<label>Jegyzet</label>
<textarea id="notesInput" placeholder="Saját jegyzet..." onchange="setNotes()"></textarea>
</div>
<div style="margin-top:.75rem;display:flex;gap:.5rem">
<button class="btn btn-outline" id="favBtn" onclick="toggleFav()">⭐ Kedvenc</button>
</div>
</div>
<div class="rpanel-section" id="aiSection" style="display:none">
<h3>🤖 AI Elemzés</h3>
<button class="btn-ai" id="analyzeBtn" onclick="analyzeChat()">✨ Elemzés indítása</button>
<div class="ai-status" id="aiStatus"></div>
<div id="todosList" style="margin-top:.75rem"></div>
</div>

<script>
// ── State ──
let chats = [];
let activeCid = null;
let activeMetadata = null;

// ── Init ──
loadChats();
loadStats();
loadTags();

async function loadChats() {
const resp = await fetch('/api/chats');
chats = await resp.json();
renderChatList();
}

async function loadStats() {
const resp = await fetch('/api/stats');
const s = await resp.json();
document.getElementById('statsGrid').innerHTML = `
<div class="stat-mini-item"><div class="stat-mini-val">${s.total_chats}</div><div class="stat-mini-lbl">Chat</div></div>
<div class="stat-mini-item"><div class="stat-mini-val">${s.total_messages}</div><div class="stat-mini-lbl">Üzenet</div></div>
<div class="stat-mini-item"><div class="stat-mini-val">${s.total_images}</div><div class="stat-mini-lbl">Kép</div></div>
<div class="stat-mini-item"><div class="stat-mini-val">${s.favorite_count}</div><div class="stat-mini-lbl">⭐ Kedvenc</div></div>
`;
}

async function loadTags() {
const resp = await fetch('/api/tags');
const tags = await resp.json();
const chips = tags.map(t => `<span class="chip" onclick="filterByTag('${t}')">${t}</span>`).join('');
document.getElementById('filterChips').innerHTML = chips;
}

function renderChatList(filtered) {
const list = filtered || chats;
const html = list.map(c => {
const fav = c.is_favorite ? '<span class="ci-badge fav">⭐</span>' : '';
const img = c.image_count > 0 ? `<span class="ci-badge img">${c.image_count}🖼</span>` : '';
const ai = c.analyzed_at ? '<span class="ci-badge" style="background:rgba(167,139,250,.15);color:#a78bfa">🤖</span>' : '';
return `<div class="chat-item${c.cid===activeCid?' active':''}" onclick="selectChat('${c.cid}')">
<div><div class="ci-title">${esc(c.title)}</div><div class="ci-meta">${c.message_count} üzenet</div></div>
<div class="ci-badges">${ai}${fav}${img}</div>
</div>`;
}).join('');
document.getElementById('chatList').innerHTML = html || '<div style="padding:1rem;color:var(--text-dim)">Nincs találat.</div>';
}

async function handleSearch(q) {
if (!q.trim()) { renderChatList(); loadTags(); return; }
const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
const results = await resp.json();
const filtered = results.map(r => ({
cid: r.cid, title: r.title, message_count: r.message_count,
image_count: 0, is_favorite: r.is_favorite, tags: r.tags || [], status: r.status
}));
renderChatList(filtered);
}

function filterByTag(tag) {
const filtered = chats.filter(c => (c.tags||[]).includes(tag));
renderChatList(filtered);
}

async function selectChat(cid) {
activeCid = cid;
renderChatList();
// Betöltjük a chat tartalmát
const resp = await fetch('/api/chat/' + cid);
if (!resp.ok) { document.getElementById('reader').innerHTML = '<div class="empty-state"><p>Nem található.</p></div>'; return; }
const data = await resp.json();
renderChat(data);
// Metaadatok és AI eredmények betöltése
loadMetadata(cid);
loadAiResults(cid);
}

function renderChat(data) {
const turns = data.turns || [];
const html = turns.slice().reverse().map(t => {
const role = (t.role||'unknown').toUpperCase();
const cls = role === 'USER' ? 'turn-user' : 'turn-model';
const rc = role === 'USER' ? 'user' : 'model';
const label = role === 'USER' ? '👤 Te' : '🤖 Gemini';
let imgs = '';
if (t.images && t.images.length) {
imgs = '<div class="turn-images">' + t.images.map(i =>
`<img src="${esc(i.downloaded_path || i.url)}" alt="${esc(i.alt||'')}" loading="lazy">`
).join('') + '</div>';
}
return `<div class="turn ${cls}"><div class="turn-role ${rc}">${label}</div><div class="turn-text">${esc(t.text||'')}</div>${imgs}</div>`;
}).join('');
document.getElementById('reader').innerHTML = `
<h1>${esc(data.title||'Untitled')}</h1>
<div class="meta">Chat ID: <code>${data.cid||''}</code> &middot; ${turns.length} üzenet &middot; Export: ${data.exported_at||''}</div>
${html}`;
}

async function loadMetadata(cid) {
const resp = await fetch('/api/chat/' + cid + '/metadata');
activeMetadata = await resp.json();
document.getElementById('metaSection').style.display = 'block';
document.getElementById('projectInput').value = activeMetadata.project || '';
document.getElementById('notesInput').value = activeMetadata.notes || '';
document.getElementById('favBtn').textContent = activeMetadata.is_favorite ? '⭐ Kedvenc (be)' : '☆ Kedvenc (ki)';
renderTagList();
}

function renderTagList() {
if (!activeMetadata) return;
const html = (activeMetadata.tags||[]).map(t =>
`<span class="tag-item">${esc(t)}<span class="tag-del" onclick="removeTag('${t}')">×</span></span>`
).join('');
document.getElementById('tagList').innerHTML = html;
}

async function addTag() {
const input = document.getElementById('tagInput');
const val = input.value.trim();
if (!val || !activeCid) return;
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'add_tags',tags:[val]})
});
input.value = '';
loadMetadata(activeCid);
loadTags();
}

async function removeTag(tag) {
if (!activeCid) return;
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'remove_tags',tags:[tag]})
});
loadMetadata(activeCid);
loadTags();
}

async function setProject() {
if (!activeCid) return;
const val = document.getElementById('projectInput').value.trim();
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'set_project',project:val})
});
}

async function setNotes() {
if (!activeCid) return;
const val = document.getElementById('notesInput').value.trim();
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'set_notes',notes:val})
});
}

async function toggleFav() {
if (!activeCid) return;
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'toggle_favorite'})
});
loadMetadata(activeCid);
loadChats();
}

async function reindex() {
const resp = await fetch('/api/reindex', {method:'POST'});
const data = await resp.json();
alert(data.reindexed + ' chat újraindexelve.');
loadChats();
}

// ── AI funkciók ──
async function loadAiResults(cid) {
const resp = await fetch('/api/chat/' + cid + '/ai-results');
const data = await resp.json();
// Összefoglaló
const summaryDiv = document.getElementById('aiSummary');
if (data.summary) {
summaryDiv.style.display = 'block';
summaryDiv.innerHTML = '<div class="summary-box"><div class="s-label">🤖 AI Összefoglaló</div><div class="s-text">' + esc(data.summary) + '</div></div>';
} else {
summaryDiv.style.display = 'none';
}
// Teendők
const todosDiv = document.getElementById('todosList');
const todos = data.todos || [];
if (todos.length > 0) {
const catLabels = {todo:'📋 Teendő',project_idea:'💡 Projektötlet',decision:'🎯 Döntés',learning:'📖 Tanulság'};
todosDiv.innerHTML = todos.map(t => {
const done = t.done ? ' done' : '';
const checked = t.done ? ' checked' : '';
const cat = catLabels[t.category] || t.category;
return `<div class="todo-item${done}">
<input type="checkbox" ${checked} onchange="toggleTodoDone(${t.id}, this.checked)">
<div><div class="todo-text">${esc(t.text)}</div><span class="todo-cat">${cat}</span></div>
</div>`;
}).join('');
} else {
todosDiv.innerHTML = '';
}
// AI panel akkor is látszik, ha nincs eredmény (az Analyze gomb miatt)
document.getElementById('aiSection').style.display = 'block';
document.getElementById('aiStatus').textContent = data.analyzed_at ? 'Elemezve: ' + data.analyzed_at.substring(0, 16) : '';
}

async function analyzeChat() {
if (!activeCid) return;
const btn = document.getElementById('analyzeBtn');
const status = document.getElementById('aiStatus');
btn.disabled = true;
btn.textContent = '⏳ Elemzés folyamatban...';
status.textContent = '';
try {
const resp = await fetch('/api/chat/' + activeCid + '/analyze', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
const data = await resp.json();
if (data.error) { status.textContent = '❌ ' + data.error; }
else { status.textContent = '✅ Kész!'; loadAiResults(activeCid); loadChats(); }
} catch(e) {
status.textContent = '❌ Hálózati hiba';
} finally {
btn.disabled = false;
btn.textContent = '✨ Elemzés indítása';
}
}

async function toggleTodoDone(todoId, done) {
// A chat_todos tábla frissítése a manifest-en keresztül
if (!activeCid) return;
await fetch('/api/chat/' + activeCid + '/metadata', {
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'toggle_todo',todo_id:todoId,done:done})
});
}

function esc(s) {
if (!s) return '';
return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
