<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c8eff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Háttér -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Csillag/kristály forma -->
  <g transform="translate(256,256)">
    <!-- Nagy kristály -->
    <path d="M0-140 L40-40 L140 0 L40 40 L0 140 L-40 40 L-140 0 L-40-40 Z"
          fill="url(#sparkle)" opacity="0.95"/>
    <!-- Belső fény -->
    <path d="M0-90 L20-20 L90 0 L20 20 L0 90 L-20 20 L-90 0 L-20-20 Z"
          fill="#fff" opacity="0.2"/>
    <!-- Kis pontok -->
    <circle cx="-80" cy="-80" r="12" fill="#6c8eff" opacity="0.6"/>
    <circle cx="85" cy="-75" r="8" fill="#a78bfa" opacity="0.5"/>
    <circle cx="-70" cy="90" r="10" fill="#34d399" opacity="0.4"/>
    <circle cx="90" cy="85" r="6" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>
